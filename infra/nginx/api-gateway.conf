map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8000;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $interview_service http://interview-service:8000;
    set $media_service http://media-service:8000;
    set $analytics_service http://analytics-service:8000;
    set $reporting_service http://reporting-service:8000;

    client_max_body_size 50m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        proxy_pass $interview_service;
    }

    location /tech/dashboard {
        proxy_pass $analytics_service;
    }

    location /tech/stt {
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass $media_service;
    }

    location /tech/tts {
        proxy_pass $media_service;
    }

    location /ws/tech/stt {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $media_service;
    }

    location ~ ^/tech/sessions/[^/]+/(vision|audio|proctoring)$ {
        proxy_pass $media_service;
    }

    location ~ ^/tech/sessions/[^/]+/(report\.pdf|insights-report\.pdf)$ {
        proxy_pass $reporting_service;
    }

    location /ws/tech/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $interview_service;
    }

    location /tech/sessions {
        proxy_pass $interview_service;
    }

    location / {
        proxy_pass $interview_service;
    }
}




