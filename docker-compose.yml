x-backend-service: &backend-service
  build:
    context: ./backend
  env_file:
    - ./.env
  environment: &backend-environment
    CUSTOM_EMOTION_MODEL_DIR: /app/data/models/emotion/efficientnet_b3_20260425_053142
    DATABASE_URL: ""
  volumes:
    - ./backend/data:/app/data
  restart: unless-stopped

services:
  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8001:8000"
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - interview-service
      - media-service
      - analytics-service
      - reporting-service
    restart: unless-stopped

  interview-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/interview/Dockerfile

  media-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/media/Dockerfile

  analytics-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/analytics/Dockerfile

  reporting-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/reporting/Dockerfile

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3001
        NEXT_PUBLIC_REPORT_SHARE_BASE_URL: http://localhost:3001
    environment:
      TECH_API_BASE_URL: http://api-gateway:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      NEXT_PUBLIC_REPORT_SHARE_BASE_URL: http://localhost:3001
    ports:
      - "3001:8080"
    depends_on:
      - api-gateway
    restart: unless-stopped
