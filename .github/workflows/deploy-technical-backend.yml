name: Deploy legacy technical backend to Azure App Service

on:
  workflow_dispatch:

concurrency:
  group: technical-agent-backend-legacy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Prepare backend package
        run: |
          test -f backend/data/models/emotion/efficientnet_b3_20260425_053142/model.keras
          ! grep -q "version https://git-lfs.github.com/spec" backend/data/models/emotion/efficientnet_b3_20260425_053142/model.keras
          mkdir package
          cp -r backend/. package/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: technical-backend-legacy
          path: package

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: technical-backend-legacy
          path: package

      - name: Zip backend package
        run: |
          cd package
          zip -r ../backend-app.zip .

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: technical-agent-backend
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_TECHNICAL_AGENT_BACKEND }}
          package: backend-app.zip
