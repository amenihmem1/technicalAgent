name: Deploy technical frontend to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: technical-agent-frontend-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --include=optional

      - name: Build frontend
        working-directory: frontend
        env:
          TECH_API_BASE_URL: https://technical-agent-backend-h2geetcegua5dfah.centralus-01.azurewebsites.net
          NEXT_PUBLIC_APP_URL: https://technical-agent-frontend.azurewebsites.net
          NEXT_PUBLIC_REPORT_SHARE_BASE_URL: https://technical-agent-frontend.azurewebsites.net
        run: npm run build

      - name: Prepare frontend package
        run: |
          mkdir package
          cp -a frontend/.next/standalone/. package/
          mkdir -p package/.next
          cp -a frontend/.next/static package/.next/static
          cp -a frontend/public package/public
          node -e "const fs=require('fs');const pkg=require('./frontend/package.json');pkg.scripts={start:'node server.js'};delete pkg.devDependencies;fs.writeFileSync('package/package.json', JSON.stringify(pkg,null,2));"
          test -f package/server.js
          test -d package/.next/static

      - name: Zip frontend package
        run: |
          cd package
          zip -r ../frontend-app.zip .
          cd ..
          unzip -l frontend-app.zip | grep "server.js"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: technical-frontend
          path: frontend-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: technical-frontend
          path: .

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: technical-agent-frontend
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_TECHNICAL_AGENT_FRONTEND }}
          package: frontend-app.zip
