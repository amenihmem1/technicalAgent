name: Build and deploy Node.js app to Azure Web App - rh-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --include=optional

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_APP_URL: https://rh-frontend.azurewebsites.net
          NEXT_PUBLIC_REPORT_SHARE_BASE_URL: https://rh-frontend.azurewebsites.net
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir package
          cp -a frontend/.next/standalone/. package/
          mkdir -p package/.next
          cp -a frontend/.next/static package/.next/static
          cp -a frontend/public package/public
          node -e "const fs=require('fs');const pkg=require('./frontend/package.json');pkg.scripts={start:'node server.js'};delete pkg.devDependencies;fs.writeFileSync('package/package.json', JSON.stringify(pkg,null,2));"
          test -f package/server.js
          test -d package/.next/static

      - name: Create deployment zip
        run: |
          cd package
          zip -r ../node-app.zip .
          cd ..
          unzip -l node-app.zip | grep "server.js"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: node-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rh-frontend'
          slot-name: 'Production'
          package: node-app.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DEF059F71E6B4B2F80BA343E1A840852 }}
