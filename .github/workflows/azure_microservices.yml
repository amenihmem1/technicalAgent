name: Build and deploy technical Azure microservices

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: technical-azure-microservices-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}

jobs:
  backend-services:
    name: Build and deploy ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: interview-service
            dockerfile: backend/services/interview/Dockerfile
            context: backend
            image: technique-agent-interview-service
          - service: media-service
            dockerfile: backend/services/media/Dockerfile
            context: backend
            image: technique-agent-media-service
          - service: analytics-service
            dockerfile: backend/services/analytics/Dockerfile
            context: backend
            image: technique-agent-analytics-service
          - service: reporting-service
            dockerfile: backend/services/reporting/Dockerfile
            context: backend
            image: technique-agent-reporting-service

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Restore media emotion model from current image
        if: matrix.service == 'media-service'
        run: |
          model_dir="backend/data/models/emotion/efficientnet_b3_20260425_053142"
          model_path="$model_dir/model.keras"
          if [ ! -s "$model_path" ] || grep -q "version https://git-lfs.github.com/spec" "$model_path"; then
            docker pull "${REGISTRY}/technique-agent-media-service:latest"
            container_id="$(docker create "${REGISTRY}/technique-agent-media-service:latest")"
            trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
            docker cp "$container_id:/app/data/models/emotion/efficientnet_b3_20260425_053142/model.keras" "$model_path"
          fi
          test "$(wc -c < "$model_path")" -gt 1000000

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest

  api-gateway:
    name: Build and deploy api-gateway
    runs-on: ubuntu-latest
    needs: backend-services

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: infra/nginx
          file: infra/nginx/Dockerfile.azure
          push: true
          tags: |
            ${{ env.REGISTRY }}/technique-agent-gateway-service:${{ github.sha }}
            ${{ env.REGISTRY }}/technique-agent-gateway-service:latest
